short_bio: >-
  <p>
  I'm a Post-doctoral Fellow at the <strong><a href="https://repository.eduhk.hk/en/organisations/analyticsassessment-research-centre-arc/" style="color: blue;">Analytics/Assessment Research Centre</a></strong> at The Education University of Hong Kong,
  working under the supervision of <strong><a href="https://www.eduhk.hk/en/experts/professor-gu-ming-yue-michelle" style="color: blue;">Prof. Michelle Mingyue Gu</a></strong>.
  </p>

  <p>
    I received my <strong>Ph.D.</a></strong> in English from Lingnan University, where i was supervised by <strong><a href="https://www.ln.edu.hk/eng/people/academic-staff/janet-ho" style="color: blue;">Prof. Janet Ho</a></strong> and <strong><a href="https://www.ln.edu.hk/eng/people/academic-staff/andrew-sewell" style="color: blue;">Prof. Andrew Sewell</a></strong>. Previously, I earned my M.A. in Language Studies with Distinctions
    from City University of Hong Kong, and spent time as a Visiting Scholar at Panteion University of Social and Political Sciences in Athens under the supervision of <strong><a href="https://anthropology.panteion.gr/index.php/en/dep-2/475-salomi-boukala" style="color: blue;">Dr. Salomi Boukala</a></strong>.
  </p>

  <p>
    My research lies at the intersection of sociolinguistics, critical discouse analysis, and digital media studies. I am driven by a central
    inquiry: how are marginalized identities constructed, contested, and negotiated in the increasingly polarized landscapes of the digital age?
    To explore this, my work conbines qualitative methodologies, such as ethnography, discourse analysis, and narrative analysis, with advanced 
    computational linguistic approaches.
  </p>

  <p>
    <i class="fa-solid fa-rectangle-ad" style="color: #d60000;"></i>
    <span style="color: #d60000;">I am looking for collaborators </span> 
    interested in Experimental Linguistics, particularly those with expertise in designing cognitive experiments and utilizing physiological
    instruments such as eye-tracking and fNIRS. My goal is to pioneer novel mixed-methods approaches that bridge discourse analysis and cognitive science,
    empowering future researchers to explore how digital discourse is processed in real time and understanding the dynamic impacts of human-computer 
    interaction. If you are interested in collaborating, please feel free to reach out via email.
  </p>



